<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-metalic-gradient text-white">
    <div class="min-h-screen flex items-center justify-center">
        <div class="glass-panel p-8 w-96">
            <h2 class="text-2xl font-bold mb-4">Buat Password Baru</h2>
            <input type="password" id="newPassword" placeholder="Password baru" class="w-full mb-3 p-3 rounded-lg bg-[#122b50]">
            <input type="password" id="confirmPassword" placeholder="Konfirmasi password" class="w-full mb-3 p-3 rounded-lg bg-[#122b50]">
            <button id="updatePasswordBtn" class="w-full bg-[#316bc7] py-2 rounded-full">Update Password</button>
            <div id="message" class="text-sm mt-2 text-yellow-300"></div>
        </div>
    </div>

    <script>
        const supabase = window.supabase.createClient(
            'https://mpgkhjzvvzcczsdczlca.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wZ2toanp2dnpjY3pzZGN6bGNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjY2NDQsImV4cCI6MjA4OTI0MjY0NH0.HrRAnpdTAv86RO4nkPMV6NXYrM8MkrpajR7mKkZwfS8'
        );

        document.getElementById('updatePasswordBtn').addEventListener('click', async () => {
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (newPass !== confirm) {
                document.getElementById('message').textContent = 'Password tidak cocok!';
                return;
            }
            
            const { error } = await supabase.auth.updateUser({ password: newPass });
            
            if (error) {
                document.getElementById('message').textContent = 'Gagal: ' + error.message;
            } else {
                document.getElementById('message').textContent = 'Password berhasil diubah!';
                setTimeout(() => window.location.href = '/', 2000);
            }
        });
    </script>
</body>
</html>
